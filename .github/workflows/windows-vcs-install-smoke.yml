name: Smoke VCS extras install

on:
  push:
    branches:
      - master
      - main
    paths:
      - pyproject.toml
      - packaging/**
      - scripts/vsmlrt.py
      - scripts/vsmlrt_dll_paths.py
      - tools/smoke_vcs_extras_install.py
      - .github/workflows/windows-vcs-install-smoke.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: generic
            extras: generic
            needs_vulkan: true
          - name: cu121
            extras: cu121
            needs_vulkan: false
          - name: cu129
            extras: cu129
            needs_vulkan: false
          - name: cu121 plus generic
            extras: cu121,generic
            needs_vulkan: true
          - name: cu129 plus generic
            extras: cu129,generic
            needs_vulkan: true
    runs-on: windows-2022

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Vulkan SDK
        if: matrix.needs_vulkan
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://sdk.lunarg.com/sdk/download/1.4.321.1/windows/vulkansdk-windows-X64-1.4.321.1.exe?Human=true" -OutFile VulkanSDK.exe
          $installer = Start-Process -FilePath VulkanSDK.exe -Wait -PassThru -ArgumentList "--accept-licenses --default-answer --confirm-command install"
          $installer.WaitForExit()
          "C:\VulkanSDK\1.4.321.1\Bin" | Add-Content -LiteralPath $env:GITHUB_PATH -Encoding utf8

      - name: Install package from default branch extras
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir pefile
          python -m pip install --no-cache-dir "vs-mlrt[${{ matrix.extras }}] @ git+https://github.com/${{ github.repository }}.git"

      - name: Verify installed layout
        shell: pwsh
        run: python tools/smoke_vcs_extras_install.py --extras "${{ matrix.extras }}"
