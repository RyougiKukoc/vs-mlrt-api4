name: Build Windows VCS TRT package

on:
  push:
    tags:
      - cu121
      - cu129
  workflow_dispatch:
    inputs:
      cuda-flavor:
        description: CUDA payload line to build
        type: choice
        required: true
        default: cu121
        options:
          - all
          - cu121
          - cu129
      publish:
        description: Upload payload to the matching GitHub Release
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        cuda_flavor: [cu121, cu129]
    runs-on: windows-2022

    steps:
      - name: Select CUDA flavor
        id: select
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_CUDA_FLAVOR: ${{ inputs['cuda-flavor'] || '' }}
          MATRIX_CUDA_FLAVOR: ${{ matrix.cuda_flavor }}
        run: |
          $shouldBuild = (
            ($env:EVENT_NAME -eq "push" -and $env:REF_NAME -eq $env:MATRIX_CUDA_FLAVOR) -or
            ($env:EVENT_NAME -eq "workflow_dispatch" -and (
              $env:INPUT_CUDA_FLAVOR -eq "all" -or
              $env:INPUT_CUDA_FLAVOR -eq $env:MATRIX_CUDA_FLAVOR
            ))
          )
          "should_build=$($shouldBuild.ToString().ToLowerInvariant())" | Add-Content -LiteralPath $env:GITHUB_OUTPUT -Encoding utf8

      - name: Checkout repo
        if: steps.select.outputs.should_build == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve CUDA and TensorRT versions
        id: versions
        if: steps.select.outputs.should_build == 'true'
        shell: pwsh
        run: |
          if ("${{ matrix.cuda_flavor }}" -eq "cu121") {
            $envLines = @(
              "CUDA_VERSION=12.1.1",
              "CUDA_MINOR=12.1",
              "CUDA_ARCHS=75;86-real;89-real",
              "TENSORRT_VERSION=8.6.1.6",
              "TENSORRT_URL=https://developer.nvidia.com/downloads/compute/machine-learning/tensorrt/secure/8.6.1/zip/TensorRT-8.6.1.6.Windows10.x86_64.cuda-12.0.zip",
              "TENSORRT_LIBRARY_SUFFIX=",
              "TENSORRT_OSS_REF=v8.6.1",
              "TENSORRT_RTX_ENABLED=0",
              "CUDNN_URL=https://developer.download.nvidia.com/compute/cudnn/redist/cudnn/windows-x86_64/cudnn-windows-x86_64-8.9.7.29_cuda12-archive.zip"
            )
          } else {
            $envLines = @(
              "CUDA_VERSION=12.9.1",
              "CUDA_MINOR=12.9",
              "CUDA_ARCHS=75;86-real;89-real;120-real",
              "TENSORRT_VERSION=11.1.0.106",
              "TENSORRT_URL=https://developer.nvidia.com/downloads/compute/machine-learning/tensorrt/11.1.0/zip/TensorRT-Enterprise-11.1.0.106-Windows-amd64-cuda-12.9-Release-external.zip",
              "TENSORRT_LIBRARY_SUFFIX=_11",
              "TENSORRT_OSS_REF=v11.1",
              "TENSORRT_RTX_ENABLED=1",
              "TENSORRT_RTX_VERSION=1.5.0.114",
              "TENSORRT_RTX_URL=https://developer.nvidia.com/downloads/trt/rtx_sdk/secure/1.5/TensorRT-RTX-1.5.0.114-Windows-amd64-cuda-12.9-Release-external.zip",
              "TENSORRT_RTX_LIBRARY_SUFFIX=_1_5",
              "CUDNN_URL=https://developer.download.nvidia.com/compute/cudnn/redist/cudnn/windows-x86_64/cudnn-windows-x86_64-9.19.0.56_cuda12-archive.zip"
            )
          }
          $envLines | Add-Content -LiteralPath $env:GITHUB_ENV -Encoding utf8
          foreach ($line in $envLines) {
            $name, $value = $line -split "=", 2
            "$($name.ToLowerInvariant())=$value" | Add-Content -LiteralPath $env:GITHUB_OUTPUT -Encoding utf8
          }

      - name: Setup MSVC
        if: steps.select.outputs.should_build == 'true'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Ninja
        if: steps.select.outputs.should_build == 'true'
        shell: pwsh
        run: python -m pip install ninja

      - name: Cache CUDA
        if: steps.select.outputs.should_build == 'true'
        id: cache-cuda
        uses: actions/cache@v5
        with:
          path: cuda-redist/${{ matrix.cuda_flavor }}
          key: ${{ runner.os }}-vsmlrt-vcs-${{ matrix.cuda_flavor }}-redist-v2

      - name: Setup CUDA
        if: steps.select.outputs.should_build == 'true'
        shell: pwsh
        run: |
          $cudaPath = Join-Path $pwd "cuda-redist\${{ matrix.cuda_flavor }}"
          $nvcc = Join-Path $cudaPath "bin\nvcc.exe"

          if (-not (Test-Path -LiteralPath $nvcc)) {
            $baseUrl = "https://developer.download.nvidia.com/compute/cuda/redist"
            $manifestPath = "cuda-redistrib.json"
            curl.exe -fL -o $manifestPath "$baseUrl/redistrib_$env:CUDA_VERSION.json"
            $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
            $packages = @(
              "cuda_cccl",
              "cuda_cudart",
              "cuda_cupti",
              "cuda_nvcc",
              "cuda_nvrtc",
              "cuda_nvtx",
              "libcublas",
              "libcufft",
              "libnvjitlink"
            )
            New-Item -ItemType Directory -Force -Path $cudaPath, cuda-downloads | Out-Null

            foreach ($package in $packages) {
              $entry = $manifest.$package.'windows-x86_64'
              if (-not $entry) {
                throw "CUDA redistrib package $package is unavailable for Windows x86_64"
              }
              $archive = "cuda-downloads\$package.zip"
              $extract = "cuda-downloads\$package"
              curl.exe -fL -o $archive "$baseUrl/$($entry.relative_path)"
              7z x -y $archive "-o$extract"
              $root = Get-ChildItem -Path $extract -Directory | Select-Object -First 1
              Copy-Item -Path "$($root.FullName)\*" -Destination $cudaPath -Recurse -Force
            }
          }

          if (-not (Test-Path -LiteralPath $nvcc)) {
            Write-Host "CUDA directories found:"
            Get-ChildItem -Path $cudaPath -Recurse -Filter nvcc.exe -ErrorAction SilentlyContinue |
              Select-Object -ExpandProperty FullName
            throw "nvcc was not found at $nvcc"
          }
          & $nvcc --version
          "CUDA_PATH=$cudaPath" | Add-Content -LiteralPath $env:GITHUB_ENV -Encoding utf8
          "$cudaPath\bin" | Add-Content -LiteralPath $env:GITHUB_PATH -Encoding utf8
          "$cudaPath\nvvm\bin" | Add-Content -LiteralPath $env:GITHUB_PATH -Encoding utf8

      - name: Download TensorRT
        if: steps.select.outputs.should_build == 'true'
        shell: pwsh
        run: |
          curl.exe -L -o trt.zip $env:TENSORRT_URL
          Expand-Archive -LiteralPath trt.zip -DestinationPath . -Force
          Move-Item -Path (Get-ChildItem -Directory TensorRT-* | Select-Object -First 1).FullName -Destination tensorrt

      - name: Download TensorRT-RTX
        if: steps.select.outputs.should_build == 'true' && matrix.cuda_flavor == 'cu129'
        shell: pwsh
        run: |
          curl.exe -L -o trt-rtx.zip $env:TENSORRT_RTX_URL
          Expand-Archive -LiteralPath trt-rtx.zip -DestinationPath . -Force
          Move-Item -Path (Get-ChildItem -Directory TensorRT-RTX-* | Select-Object -First 1).FullName -Destination tensorrt-rtx

      - name: Download cuDNN
        if: steps.select.outputs.should_build == 'true'
        shell: pwsh
        run: |
          curl.exe -L -o cudnn.zip $env:CUDNN_URL
          Expand-Archive -LiteralPath cudnn.zip -DestinationPath . -Force
          Move-Item -Path (Get-ChildItem -Directory cudnn-windows-* | Select-Object -First 1).FullName -Destination cudnn

      - name: Download VapourSynth R77 headers
        if: steps.select.outputs.should_build == 'true'
        shell: pwsh
        run: |
          curl.exe -s -o vs.zip -L https://github.com/vapoursynth/vapoursynth/archive/refs/tags/R77.zip
          Expand-Archive -LiteralPath vs.zip -DestinationPath vstrt -Force
          Move-Item -Path (Get-ChildItem -Path vstrt -Directory -Filter "vapoursynth-*" | Select-Object -First 1).FullName -Destination vstrt\vapoursynth

      - name: Configure vstrt
        if: steps.select.outputs.should_build == 'true'
        shell: pwsh
        run: |
          $cudaPath = $env:CUDA_PATH
          cmake -S vstrt -B vstrt\build -G Ninja -LA `
            -D CMAKE_BUILD_TYPE=Release `
            -D CMAKE_CXX_FLAGS="/EHsc /Wall /wd4100 /wd4625 /wd4626 /wd4710 /wd4711 /wd4820 /wd4996 /wd5026 /wd5027" `
            -D CMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -D CUDAToolkit_ROOT="$cudaPath" `
            -D VAPOURSYNTH_INCLUDE_DIRECTORY="$pwd\vstrt\vapoursynth\include" `
            -D TENSORRT_HOME="$pwd\tensorrt" `
            -D USE_NVINFER_PLUGIN=ON `
            -D TENSORRT_LIBRARY_SUFFIX="$env:TENSORRT_LIBRARY_SUFFIX"

      - name: Build vstrt
        if: steps.select.outputs.should_build == 'true'
        shell: pwsh
        run: |
          cmake --build vstrt\build --config Release --verbose
          cmake --install vstrt\build --prefix vstrt\install

      - name: Configure vstrt_rtx
        if: steps.select.outputs.should_build == 'true' && matrix.cuda_flavor == 'cu129'
        shell: pwsh
        run: |
          $cudaPath = $env:CUDA_PATH
          cmake -S vstrt -B vstrt\build_rtx -G Ninja -LA `
            -D CMAKE_BUILD_TYPE=Release `
            -D CMAKE_CXX_FLAGS="/EHsc /Wall /wd4100 /wd4625 /wd4626 /wd4710 /wd4711 /wd4820 /wd4996 /wd5026 /wd5027" `
            -D CMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -D CUDAToolkit_ROOT="$cudaPath" `
            -D VAPOURSYNTH_INCLUDE_DIRECTORY="$pwd\vstrt\vapoursynth\include" `
            -D TENSORRT_HOME="$pwd\tensorrt-rtx" `
            -D TENSORRT_LIBRARY_SUFFIX="$env:TENSORRT_RTX_LIBRARY_SUFFIX"

      - name: Build vstrt_rtx
        if: steps.select.outputs.should_build == 'true' && matrix.cuda_flavor == 'cu129'
        shell: pwsh
        run: |
          cmake --build vstrt\build_rtx --config Release --verbose
          cmake --install vstrt\build_rtx --prefix vstrt\install_rtx

      - name: Checkout TensorRT OSS
        if: steps.select.outputs.should_build == 'true'
        shell: pwsh
        run: git clone --depth 1 --branch $env:TENSORRT_OSS_REF https://github.com/NVIDIA/TensorRT.git tensorrt-oss

      - name: Build custom trtexec
        if: steps.select.outputs.should_build == 'true'
        id: trtexec
        continue-on-error: true
        shell: pwsh
        run: |
          Copy-Item vstrt\trtexec\CMakeLists.txt tensorrt-oss\samples\trtexec\CMakeLists.txt -Force
          Copy-Item vstrt\trtexec\*.cpp tensorrt-oss\samples\trtexec -Force
          Copy-Item vstrt\longpath.manifest tensorrt-oss\samples\trtexec -Force
          Copy-Item vstrt\trtexec\trtexec.patch tensorrt-oss\trtexec.patch -Force
          Push-Location tensorrt-oss
          git apply trtexec.patch --verbose
          Pop-Location
          New-Item -ItemType Directory -Force tensorrt-oss\include\nlohmann | Out-Null
          curl.exe -L -o tensorrt-oss\include\nlohmann\json.hpp https://raw.githubusercontent.com/nlohmann/json/refs/tags/v3.11.3/single_include/nlohmann/json.hpp
          $cudaPath = $env:CUDA_PATH
          $cudaArchitectures = $env:CUDA_ARCHS -replace ';', ';'
          cmake -S tensorrt-oss\samples\trtexec -B vstrt\build_trtexec -G Ninja `
            -D CMAKE_BUILD_TYPE=Release `
            -D CMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -D CUDAToolkit_ROOT="$cudaPath" `
            -D CMAKE_UNITY_BUILD=ON `
            -D CMAKE_UNITY_BUILD_BATCH_SIZE=0 `
            -D CMAKE_CXX_STANDARD=20 `
            -D CMAKE_CUDA_ARCHITECTURES="$cudaArchitectures"
          cmake --build vstrt\build_trtexec --verbose
          cmake --install vstrt\build_trtexec --prefix vstrt\trtexec-install

      - name: Assemble payload
        if: steps.select.outputs.should_build == 'true'
        shell: pwsh
        run: |
          function Copy-DllsFromPackage($packageDir, $destinationDir, [switch]$Recursive) {
            if ($Recursive) {
              $dlls = Get-ChildItem -LiteralPath $packageDir -Recurse -Filter "*.dll" -File -ErrorAction SilentlyContinue
            } else {
              $dlls = foreach ($runtimePath in @("$packageDir\bin\*.dll", "$packageDir\bin\x64\*.dll", "$packageDir\lib\*.dll", "$packageDir\lib\x64\*.dll")) {
                Get-ChildItem -Path $runtimePath -File -ErrorAction SilentlyContinue
              }
            }
            foreach ($dll in $dlls) {
              Copy-Item -LiteralPath $dll.FullName -Destination (Join-Path $destinationDir $dll.Name) -Force
            }
          }

          $basePluginDir = "payload-base\vsmlrt"
          $baseCudaDir = "$basePluginDir\vsmlrt-cuda"
          $cudaPayloadDir = "payload-cuda\vsmlrt\vsmlrt-cuda"
          $cudnnPayloadDir = "payload-cudnn\vsmlrt\vsmlrt-cuda"
          New-Item -ItemType Directory -Force $baseCudaDir, $cudaPayloadDir, $cudnnPayloadDir | Out-Null

          Copy-Item vstrt\install\bin\vstrt.dll $basePluginDir
          @(
            "[VapourSynth Manifest V1]",
            "vstrt"
          ) | Set-Content -LiteralPath "$basePluginDir\manifest.vs" -Encoding ascii
          Copy-DllsFromPackage "tensorrt" $baseCudaDir
          Copy-DllsFromPackage "cudnn" $cudnnPayloadDir -Recursive

          if ("${{ matrix.cuda_flavor }}" -eq "cu129") {
            $trtCoreCudaDir = "payload-trt-core\vsmlrt\vsmlrt-cuda"
            $trtPluginCudaDir = "payload-trt-plugin\vsmlrt\vsmlrt-cuda"
            $trtExtraCudaDir = "payload-trt-extra\vsmlrt\vsmlrt-cuda"
            New-Item -ItemType Directory -Force $trtCoreCudaDir, $trtPluginCudaDir, $trtExtraCudaDir | Out-Null
            foreach ($dll in Get-ChildItem -Path $baseCudaDir -Filter "*.dll") {
              if ($dll.Name -eq "nvinfer_11.dll") {
                Move-Item -LiteralPath $dll.FullName -Destination $trtCoreCudaDir
              } elseif ($dll.Name -eq "nvinfer_plugin_11.dll") {
                Move-Item -LiteralPath $dll.FullName -Destination $trtPluginCudaDir
              } else {
                Move-Item -LiteralPath $dll.FullName -Destination $trtExtraCudaDir
              }
            }
          }

          $cudaPath = $env:CUDA_PATH
          foreach ($runtimePath in @("$cudaPath\bin\*.dll", "$cudaPath\bin\x64\*.dll", "$cudaPath\extras\CUPTI\lib64\*.dll", "$cudaPath\nvvm\bin\*.dll")) {
            Copy-Item $runtimePath $cudaPayloadDir -ErrorAction SilentlyContinue
          }
          if (Test-Path vstrt\trtexec-install\bin\trtexec.exe) {
            Copy-Item vstrt\trtexec-install\bin\trtexec.exe $baseCudaDir
          } else {
            Copy-Item tensorrt\bin\trtexec.exe $baseCudaDir
          }

          if (Test-Path vstrt\install_rtx\bin\vstrt_rtx.dll) {
            $rtxPluginDir = "payload-rtx\vsmlrt"
            $rtxCudaDir = "$rtxPluginDir\vsmlrt-cuda"
            New-Item -ItemType Directory -Force $rtxCudaDir | Out-Null
            Copy-Item vstrt\install_rtx\bin\vstrt_rtx.dll $rtxPluginDir
            Copy-DllsFromPackage "tensorrt-rtx" $rtxCudaDir
            Copy-Item tensorrt-rtx\bin\tensorrt_rtx.exe $rtxCudaDir -ErrorAction SilentlyContinue
          }

      - name: Inspect payload layout
        if: steps.select.outputs.should_build == 'true'
        shell: pwsh
        run: |
          $trtSuffix = ""
          if ("${{ matrix.cuda_flavor }}" -eq "cu129") {
            $trtSuffix = "_11"
          }
          $required = @(
            "payload-base\vsmlrt\manifest.vs",
            "payload-base\vsmlrt\vstrt.dll",
            "payload-base\vsmlrt\vsmlrt-cuda\trtexec.exe",
            "payload-cuda\vsmlrt\vsmlrt-cuda\cublas64_12.dll",
            "payload-cuda\vsmlrt\vsmlrt-cuda\cublasLt64_12.dll",
            "payload-cuda\vsmlrt\vsmlrt-cuda\cudart64_12.dll"
          )
          if ("${{ matrix.cuda_flavor }}" -eq "cu129") {
            $required += "payload-trt-core\vsmlrt\vsmlrt-cuda\nvinfer_11.dll"
            $required += "payload-trt-plugin\vsmlrt\vsmlrt-cuda\nvinfer_plugin_11.dll"
            $required += "payload-trt-extra\vsmlrt\vsmlrt-cuda\nvonnxparser_11.dll"
            $required += "payload-rtx\vsmlrt\vstrt_rtx.dll"
            $required += "payload-rtx\vsmlrt\vsmlrt-cuda\tensorrt_rtx_1_5.dll"
          } else {
            $required += "payload-base\vsmlrt\vsmlrt-cuda\nvinfer$trtSuffix.dll"
            $required += "payload-base\vsmlrt\vsmlrt-cuda\nvinfer_plugin$trtSuffix.dll"
          }
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Missing payload item: $path"
            }
          }
          $manifest = Get-Content "payload-base\vsmlrt\manifest.vs"
          $expectedManifest = @("[VapourSynth Manifest V1]", "vstrt")
          if (Compare-Object $expectedManifest $manifest) {
            throw "CUDA manifest.vs does not match the selected plugin set."
          }
          foreach ($glob in @("payload-cuda\vsmlrt\vsmlrt-cuda\nvrtc*.dll", "payload-cudnn\vsmlrt\vsmlrt-cuda\cudnn*.dll")) {
            if (-not (Test-Path $glob)) {
              throw "Missing payload item matching: $glob"
            }
          }
          Write-Host "cuDNN payload DLLs:"
          Get-ChildItem "payload-cudnn\vsmlrt\vsmlrt-cuda" -Filter "*.dll" |
            Sort-Object Name |
            Select-Object Name, Length |
            Format-Table -AutoSize
          foreach ($path in @("payload-base\vapoursynth", "payload-cuda\vapoursynth", "payload-cudnn\vapoursynth", "payload-trt-core\vapoursynth", "payload-trt-plugin\vapoursynth", "payload-trt-extra\vapoursynth", "payload-rtx\vapoursynth")) {
            if (Test-Path $path) {
              throw "Release payload must be rooted at vsmlrt/, not vapoursynth/: $path"
            }
          }

      - name: Package payload
        if: steps.select.outputs.should_build == 'true'
        shell: pwsh
        run: |
          7z a -tzip -mx=9 "vs-mlrt-windows-x64-tensorrt-${{ matrix.cuda_flavor }}.zip" .\payload-base\*
          7z a -tzip -mx=9 "vs-mlrt-windows-x64-cuda-${{ matrix.cuda_flavor }}.zip" .\payload-cuda\*
          7z a -tzip -mx=9 "vs-mlrt-windows-x64-cudnn-${{ matrix.cuda_flavor }}.zip" .\payload-cudnn\*
          if ("${{ matrix.cuda_flavor }}" -eq "cu129") {
            7z a -tzip -mx=9 "vs-mlrt-windows-x64-tensorrt-core-cu129.zip" .\payload-trt-core\*
            7z a -tzip -mx=9 "vs-mlrt-windows-x64-tensorrt-plugin-cu129.zip" .\payload-trt-plugin\*
            7z a -tzip -mx=9 "vs-mlrt-windows-x64-tensorrt-extra-cu129.zip" .\payload-trt-extra\*
            7z a -tzip -mx=9 "vs-mlrt-windows-x64-tensorrt-rtx-cu129.zip" .\payload-rtx\*
          }
          Get-ChildItem vs-mlrt-windows-x64-*.zip |
            Select-Object Name, Length |
            Format-Table -AutoSize
          foreach ($asset in Get-ChildItem vs-mlrt-windows-x64-*.zip) {
            if ($asset.Length -ge 2147483648) {
              throw "Release asset exceeds GitHub's 2 GiB limit: $($asset.Name) ($($asset.Length) bytes)"
            }
          }

      - name: Upload payload artifact
        if: steps.select.outputs.should_build == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: vs-mlrt-windows-x64-tensorrt-${{ matrix.cuda_flavor }}
          path: vs-mlrt-windows-x64-*.zip

      - name: Release payload
        if: steps.select.outputs.should_build == 'true' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.cuda_flavor }}
          files: vs-mlrt-windows-x64-*.zip
          fail_on_unmatched_files: true
          generate_release_notes: false
          prerelease: true
